# 评估任务的标准提示词模板

task1_data_overview:
  system: "你是一个数据分析专家，擅长分析时序数据和设备运行数据。"
  user: |
    请分析以下Excel文件中的数据：{file_path}
    
    要求：
    1. 描述数据的基本信息（时间范围、采样频率、设备数量等）
    2. 检查数据质量（缺失值、异常值）
    3. 提供基础统计描述（均值、标准差、最大最小值等）
    4. 生成数据分布的可视化图表
    5. 给出数据质量评估报告
    
    请提供完整的Python代码实现上述分析，并确保代码可以直接运行。

task2_pattern_analysis:
  system: "你是一个时序数据分析专家，擅长发现数据中的模式和规律。"
  user: |
    请分析Excel文件 {file_path} 中的充电量时序数据。
    
    要求：
    1. 识别日内充电模式（峰谷时段）
    2. 分析不同设备的使用模式差异
    3. 绘制时序趋势图和热力图
    4. 计算设备间的相关性
    5. 识别周期性模式
    
    请提供完整的分析代码和可视化结果。

task3_anomaly_detection:
  system: "你是一个异常检测专家，擅长识别时序数据中的异常模式。"
  user: |
    请分析Excel文件 {file_path} 中的数据，检测可能存在的异常。
    
    要求：
    1. 检测数据缺失情况
    2. 识别异常值（统计异常和业务异常）
    3. 发现设备故障模式
    4. 标记异常时段和异常设备
    5. 提供异常原因分析和处理建议
    
    请提供异常检测的完整代码和可视化结果。

task4_business_insights:
  system: "你是一个能源行业的业务分析专家，擅长从数据中提取业务洞察。"
  user: |
    基于Excel文件 {file_path} 中的储能设备运行数据，请提供业务分析。
    
    要求：
    1. 计算设备利用率和效率
    2. 识别运营优化机会
    3. 提供充放电策略建议
    4. 分析成本效益
    5. 生成管理层报告摘要
    
    请结合数据分析结果，提供具有业务价值的洞察和建议。

task5_comprehensive_report:
  system: "你是一个高级数据分析师，擅长生成专业的分析报告。"
  user: |
    请为Excel文件 {file_path} 生成一份完整的数据分析报告。
    
    报告应包括：
    1. 执行摘要（关键发现和建议）
    2. 数据概览和质量评估
    3. 详细分析结果（含图表）
    4. 异常情况说明
    5. 业务建议和下一步行动计划
    
    请生成一个结构化的、可以直接呈现给管理层的报告。